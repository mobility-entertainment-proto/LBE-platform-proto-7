<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LBE Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#04040e;touch-action:none;
  font-family:'Consolas','Courier New',monospace;color:#fff;}

/* ── Config screen ── */
#config-screen{
  position:fixed;inset:0;z-index:6;
  background:#04040e;
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;padding:20px 16px 40px;touch-action:auto;
}
#config-screen.hidden{display:none;}

#config-title{
  font-size:clamp(22px,5vw,36px);letter-spacing:4px;color:#fff;
  text-shadow:0 0 24px #55aaff;margin-bottom:4px;margin-top:8px;
}
#config-subtitle{font-size:12px;color:#445;letter-spacing:2px;margin-bottom:28px;}

.config-loc-card{
  width:100%;max-width:520px;
  background:#0d0d20;border:1px solid #2a2a4a;border-radius:12px;
  padding:16px 18px;margin-bottom:14px;
}
.config-loc-name{
  font-size:clamp(13px,3vw,16px);color:#66ccff;margin-bottom:14px;
  letter-spacing:1px;display:flex;align-items:center;gap:8px;
}
.config-loc-name span.tag{
  font-size:10px;background:#1a2a40;border:1px solid #2a4a6a;
  border-radius:4px;padding:2px 7px;color:#4488aa;letter-spacing:1px;
}
.config-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.config-field label{font-size:10px;color:#445;letter-spacing:1px;display:block;margin-bottom:5px;}
.config-field input{
  width:100%;padding:8px 10px;background:#04040e;
  border:1px solid #2a2a4a;border-radius:6px;
  color:#eee;font-family:monospace;font-size:13px;
  outline:none;touch-action:manipulation;
}
.config-field input:focus{border-color:#55aaff;}

#config-start-btn{
  width:100%;max-width:520px;
  padding:18px;border-radius:12px;
  background:#0e1a30;border:2px solid #55aaff;color:#66ccff;
  font-family:monospace;font-size:clamp(15px,3.5vw,20px);
  font-weight:bold;cursor:pointer;letter-spacing:3px;
  margin-top:8px;touch-action:manipulation;
}
#config-start-btn:active{background:#1a2a44;}

/* ── Rhythm settings card ── */
#rg-config-card{width:100%;max-width:520px;background:#0d0d20;border:1px solid #2a2a4a;border-radius:12px;padding:16px 18px;margin-bottom:14px;}
.rg-diff-row{display:flex;gap:10px;margin-bottom:10px;}
.rg-diff-btn{
  flex:1;padding:11px 0;border-radius:8px;border:2px solid #2a2a4a;
  background:#0d0d20;color:#445;font-family:monospace;font-size:12px;
  font-weight:bold;cursor:pointer;letter-spacing:1px;touch-action:manipulation;transition:all .15s;
}
#rg-diff-desc{font-size:10px;color:#445;margin-bottom:14px;min-height:14px;}
.rg-offset-row{display:flex;align-items:center;gap:10px;}
.rg-offset-row span{font-size:11px;color:#445;white-space:nowrap;}
.rg-offset-row input{flex:1;accent-color:#55aaff;}
#rg-offset-val{text-align:center;margin-top:8px;font-size:15px;font-weight:bold;color:#eee;}
#rg-offset-hint{font-size:10px;color:#445;margin-top:6px;text-align:center;}

/* ── Status screen ── */
#status-screen{
  position:fixed;inset:0;z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#04040e;transition:opacity .4s;
}
#status-screen.hidden{opacity:0;pointer-events:none;}

#status-title{
  font-size:clamp(20px,5vw,36px);letter-spacing:3px;color:#fff;
  text-shadow:0 0 24px #55aaff;margin-bottom:8px;
}
#status-subtitle{font-size:12px;color:#445;letter-spacing:2px;margin-bottom:40px;}
#status-dist{
  font-size:clamp(32px,8vw,64px);font-weight:bold;color:#66ccff;
  text-shadow:0 0 20px #55aaff;margin-bottom:8px;
}
#status-area{font-size:clamp(12px,3vw,18px);color:#778;margin-bottom:36px;letter-spacing:1px;}
#status-gps{
  position:fixed;bottom:12px;left:0;right:0;text-align:center;
  font-size:11px;color:#334;letter-spacing:1px;
}
#status-bar{
  width:min(70vw,320px);height:6px;background:rgba(255,255,255,0.07);
  border-radius:3px;margin:0 auto 24px;overflow:hidden;
}
#status-bar-fill{height:100%;background:#55aaff;border-radius:3px;transition:width .5s;}

/* ── Content container ── */
#content-container{position:fixed;inset:0;z-index:10;display:none;}

/* ── 次ジオフェンスまでの距離オーバーレイ（コンテンツ発動中に表示） ── */
#next-geo-overlay{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:rgba(4,8,24,0.82);
  padding:8px 16px;
  display:none;
  flex-direction:row;align-items:center;justify-content:center;gap:12px;
}
#next-geo-overlay.visible{display:flex;}
#next-geo-label{font-size:11px;color:#445;letter-spacing:1px;}
#next-geo-name{font-size:13px;color:#66ccff;font-weight:bold;}
#next-geo-dist{font-size:20px;font-weight:bold;color:#fff;text-shadow:0 0 12px #55aaff;min-width:80px;text-align:right;}
#next-geo-unit{font-size:11px;color:#445;}

/* ── Debug panel ── */
#debug-toggle{
  position:fixed;top:8px;right:8px;z-index:100;
  background:rgba(10,10,25,0.85);border:1px solid #334;
  color:#778;font-size:11px;padding:6px 10px;border-radius:5px;
  cursor:pointer;font-family:monospace;touch-action:manipulation;
}
#debug-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(4,8,16,0.97);border-top:1px solid #2a2a4a;
  padding:16px;display:none;
}
#debug-panel.open{display:block;}
#debug-panel h3{font-size:12px;color:#445;letter-spacing:2px;margin-bottom:12px;}
#debug-locations{display:flex;flex-wrap:wrap;gap:8px;}
.debug-loc-btn{
  padding:8px 14px;background:#0d0d20;border:1px solid #334;
  border-radius:6px;color:#aaa;font-size:12px;cursor:pointer;
  font-family:monospace;touch-action:manipulation;
}
.debug-loc-btn:active{background:#1a1a35;}
.debug-exit-btn{
  padding:8px 14px;background:#1a0808;border:1px solid #554;
  border-radius:6px;color:#f88;font-size:12px;cursor:pointer;
  font-family:monospace;touch-action:manipulation;margin-top:8px;
}
</style>
</head>
<body>

<!-- Config screen (shown first) -->
<div id="config-screen">
  <div id="config-title">LBE PLATFORM</div>
  <div id="config-subtitle">LOCATION BASED ENTERTAINMENT</div>
  <div id="config-cards"></div>

  <!-- Rhythm game settings -->
  <div id="rg-config-card">
    <div class="config-loc-name">🎵 RHYTHM GAME 設定 <span class="tag">SETTINGS</span></div>
    <div style="font-size:10px;color:#445;letter-spacing:2px;margin-bottom:10px;">難易度</div>
    <div class="rg-diff-row">
      <button class="rg-diff-btn" data-diff="EASY">EASY</button>
      <button class="rg-diff-btn" data-diff="NORMAL">NORMAL</button>
      <button class="rg-diff-btn" data-diff="HARD">HARD</button>
    </div>
    <div id="rg-diff-desc"></div>
    <div style="font-size:10px;color:#445;letter-spacing:2px;margin-bottom:10px;">オフセット調整</div>
    <div class="rg-offset-row">
      <span>-200ms</span>
      <input type="range" id="rg-offset-input" min="-200" max="200" step="1" value="0">
      <span>+200ms</span>
    </div>
    <div id="rg-offset-val">0ms</div>
    <div id="rg-offset-hint">早押し傾向→+ / 遅押し傾向→−</div>
  </div>

  <button id="config-start-btn">▶ START</button>
</div>

<!-- Status screen (geofence waiting, hidden until START) -->
<div id="status-screen" class="hidden">
  <div id="status-title">LBE PLATFORM</div>
  <div id="status-subtitle">LOCATION BASED ENTERTAINMENT</div>
  <div id="status-dist">-- m</div>
  <div id="status-area">位置情報を取得中...</div>
  <div id="status-bar"><div id="status-bar-fill" style="width:0%"></div></div>
  <div id="status-gps">GPS: 取得待機中</div>
</div>

<!-- Content area -->
<div id="content-container"></div>

<!-- 次ジオフェンスまでの距離オーバーレイ -->
<div id="next-geo-overlay">
  <span id="next-geo-label">NEXT</span>
  <span id="next-geo-name"></span>
  <span id="next-geo-dist">--</span>
  <span id="next-geo-unit">m</span>
</div>

<!-- Debug toggle -->
<button id="debug-toggle" onclick="toggleDebug()">🛠 DEBUG</button>

<!-- Debug panel -->
<div id="debug-panel">
  <h3>DEBUG — FORCE LOCATION</h3>
  <div id="debug-locations"></div>
  <button class="debug-exit-btn" onclick="debugExit()">✕ エリアを出る</button>
</div>

<script type="module">
import { AudioManager }  from './core/audio.js';
import { GeofenceEngine } from './core/geofence.js';
import { RhythmGame }    from './contents/rhythm/game.js';
import { QuizB }         from './contents/quiz-b/game.js';
import { QuizA }         from './contents/quiz-a/game.js';

// ── State ────────────────────────────────────────────────────
const audioManager = new AudioManager();
let geofence = null;
let locations = [];
let audioUnlocked = false;
let activeContent = null;

// ── DOM refs ─────────────────────────────────────────────────
const configScreen     = document.getElementById('config-screen');
const configCards      = document.getElementById('config-cards');
const statusScreen     = document.getElementById('status-screen');
const contentContainer = document.getElementById('content-container');
const statusDist       = document.getElementById('status-dist');
const statusArea       = document.getElementById('status-area');
const statusGps        = document.getElementById('status-gps');
const statusBarFill    = document.getElementById('status-bar-fill');
const nextGeoOverlay   = document.getElementById('next-geo-overlay');
const nextGeoName      = document.getElementById('next-geo-name');
const nextGeoDist      = document.getElementById('next-geo-dist');

// ── Audio unlock ──────────────────────────────────────────────
function unlockAudio() {
  if (audioUnlocked) return;
  audioManager.unlock();
  audioUnlocked = true;
}

// ── Load locations & build config cards ──────────────────────
const FALLBACK_LOCATIONS = [
  { id:'location_001', name:'Test Area - Rhythm Game', lat:35.6197488, lng:139.7762173, radius:2400, content:'rhythm', content_id:'highway_001' },
  { id:'location_002', name:'Test Area - Quiz',        lat:35.6197488, lng:139.7762173, radius:6000, content:'quiz-b', content_id:'santamonica_001' },
];
try {
  const locData = await fetch('./data/locations.json').then(r => r.json());
  locations = locData;
} catch (e) {
  console.warn('[LBE] locations.json 読み込み失敗 → フォールバック:', e.message);
  locations = FALLBACK_LOCATIONS;
}

const CONTENT_LABELS = { 'rhythm': 'RHYTHM GAME', 'quiz-b': 'QUIZ B', 'quiz-a': 'QUIZ A' };
for (const loc of locations) {
  const card = document.createElement('div');
  card.className = 'config-loc-card';
  card.dataset.locId = loc.id;
  card.innerHTML = `
    <div class="config-loc-name">
      📍 ${loc.name}
      <span class="tag">${CONTENT_LABELS[loc.content] || loc.content}</span>
    </div>
    <div class="config-fields">
      <div class="config-field">
        <label>LATITUDE</label>
        <input type="number" step="0.0001" data-field="lat" value="${loc.lat}">
      </div>
      <div class="config-field">
        <label>LONGITUDE</label>
        <input type="number" step="0.0001" data-field="lng" value="${loc.lng}">
      </div>
      <div class="config-field">
        <label>RADIUS (m)</label>
        <input type="number" step="10" data-field="radius" value="${loc.radius}">
      </div>
    </div>
  `;
  configCards.appendChild(card);
}

// ── Rhythm game settings UI ──────────────────────────────────
const RG_DIFF_INFO = {
  EASY:   { col:'#66bb6a', desc:'PERFECT ±150ms / GREAT ±300ms / GOOD ±450ms' },
  NORMAL: { col:'#26c6da', desc:'PERFECT ±100ms / GREAT ±200ms / GOOD ±300ms' },
  HARD:   { col:'#ff7043', desc:'PERFECT ±50ms / GREAT ±100ms / GOOD ±160ms'  },
};
let rgDiffKey = localStorage.getItem('rg_diff') || 'NORMAL';

function rgSelectDiff(key) {
  rgDiffKey = key;
  for (const btn of document.querySelectorAll('.rg-diff-btn')) {
    const k = btn.dataset.diff;
    const info = RG_DIFF_INFO[k];
    const sel = (k === key);
    btn.style.borderColor = sel ? info.col : '#2a2a4a';
    btn.style.color       = sel ? info.col : '#445';
    btn.style.background  = sel ? '#0a0a15' : '#0d0d20';
  }
  document.getElementById('rg-diff-desc').textContent = RG_DIFF_INFO[key]?.desc || '';
}

function rgUpdateOffset() {
  const v = +document.getElementById('rg-offset-input').value;
  const el = document.getElementById('rg-offset-val');
  el.textContent = (v >= 0 ? '+' : '') + v + 'ms';
  el.style.color  = v === 0 ? '#aaa' : v > 0 ? '#ffaa44' : '#4488ff';
}

// Init rhythm settings UI
document.getElementById('rg-offset-input').value = localStorage.getItem('rg_offset') || 0;
rgSelectDiff(rgDiffKey);
rgUpdateOffset();
document.querySelectorAll('.rg-diff-btn').forEach(btn =>
  btn.addEventListener('click', () => rgSelectDiff(btn.dataset.diff))
);
document.getElementById('rg-offset-input').addEventListener('input', rgUpdateOffset);

// Content instances
const contentRegistry = {
  'rhythm': new RhythmGame(audioManager),
  'quiz-b': new QuizB(audioManager),
  'quiz-a': new QuizA(audioManager),
};

// Inject content UIs (hidden by default)
for (const [key, content] of Object.entries(contentRegistry)) {
  const ui = content.getUI();
  ui.dataset.contentKey = key;
  ui.style.display = 'none';
  contentContainer.appendChild(ui);
}

// ── Show / hide content ───────────────────────────────────────
function showContent(contentKey) {
  for (const el of contentContainer.children) el.style.display = 'none';
  const target = contentContainer.querySelector(`[data-content-key="${contentKey}"]`);
  if (target) target.style.display = 'block';
  contentContainer.style.display = 'block';
  statusScreen.classList.add('hidden');
  activeContent = contentRegistry[contentKey];
}

function hideContent() {
  contentContainer.style.display = 'none';
  for (const el of contentContainer.children) el.style.display = 'none';
  statusScreen.classList.remove('hidden');
  activeContent = null;
}

// ── Geofence callbacks ────────────────────────────────────────
for (const loc of locations) {
  const key = loc.content;
  const original = contentRegistry[key];
  if (!original) continue;
  const origOnEnter = original.onEnter.bind(original);
  const origOnExit  = original.onExit.bind(original);
  original.onEnter = async (location) => {
    showContent(key);
    await origOnEnter(location);
  };
  original.onExit = (location) => {
    origOnExit(location);
    hideContent();
  };
}

// ── START button ──────────────────────────────────────────────
document.getElementById('config-start-btn').addEventListener('click', () => {
  unlockAudio();

  // Read input values → update locations in-place
  for (const card of configCards.children) {
    const locId  = card.dataset.locId;
    const loc    = locations.find(l => l.id === locId);
    if (!loc) continue;
    const lat    = parseFloat(card.querySelector('[data-field="lat"]').value);
    const lng    = parseFloat(card.querySelector('[data-field="lng"]').value);
    const radius = parseFloat(card.querySelector('[data-field="radius"]').value);
    if (!isNaN(lat))    loc.lat    = lat;
    if (!isNaN(lng))    loc.lng    = lng;
    if (!isNaN(radius)) loc.radius = radius;
  }

  // Apply rhythm game settings to the instance and persist
  const rg = contentRegistry['rhythm'];
  const offsetVal = +document.getElementById('rg-offset-input').value;
  rg.diffKey    = rgDiffKey;
  rg.offsetAdj  = offsetVal;
  localStorage.setItem('rg_diff',   rgDiffKey);
  localStorage.setItem('rg_offset', offsetVal);

  // Start geofence engine
  geofence = new GeofenceEngine(locations, contentRegistry);
  geofence.start(({ msg, dist, nearestLoc, nextLoc, nextDist }) => {
    statusGps.textContent = `GPS: ${msg}`;
    if (dist !== undefined && nearestLoc) {
      const inside = dist < 1;
      statusDist.textContent = inside ? 'エリア内' : `${dist.toFixed(0)} m`;
      statusArea.textContent = nearestLoc.name;
      const pct = inside ? 100 : Math.max(0, 100 - (dist / 500) * 100);
      statusBarFill.style.width = pct + '%';
    }
    // 次ジオフェンスまでの距離オーバーレイ（コンテンツ発動中のみ表示）
    if (nextLoc && nextDist < Infinity && activeContent) {
      nextGeoName.textContent = nextLoc.name;
      nextGeoDist.textContent = nextDist < 1 ? 'エリア内' : nextDist.toFixed(0);
      nextGeoOverlay.classList.add('visible');
    } else {
      nextGeoOverlay.classList.remove('visible');
    }
  });

  // Switch to waiting screen
  configScreen.classList.add('hidden');
  statusScreen.classList.remove('hidden');

  // Build debug panel
  const debugLocDiv = document.getElementById('debug-locations');
  debugLocDiv.innerHTML = '';
  for (const loc of locations) {
    const btn = document.createElement('button');
    btn.className = 'debug-loc-btn';
    btn.textContent = `📍 ${loc.name}`;
    btn.onclick = () => {
      unlockAudio();
      geofence?.debugForce(loc.id);
      document.getElementById('debug-panel').classList.remove('open');
    };
    debugLocDiv.appendChild(btn);
  }
});

// ── Debug panel globals ───────────────────────────────────────
window.toggleDebug = () => document.getElementById('debug-panel').classList.toggle('open');
window.debugExit   = () => {
  geofence?.debugExit();
  hideContent();
  document.getElementById('debug-panel').classList.remove('open');
};
</script>
</body>
</html>
